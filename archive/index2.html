    <style>
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
        }
        .bg-gradient-animation {
            background: linear-gradient(-45deg, #0f172a, #1e293b, #334155, #475569);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            position: relative; /* 子要素を絶対配置するための基準 */
            overflow: hidden; /* Canvasがはみ出ないように */
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .category-card {
            display: block;
            transition: all 0.3s ease;
            position: relative; /* z-indexを有効にするため */
            z-index: 10;
        }
        [data-aos-id="card"]:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
        }
        /* パーティクルアニメーション用のCanvasのスタイル */
        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* コンテンツより後ろ、背景グラデーションより手前に配置 */
        }
        /* コンテンツがCanvasの上に来るようにz-indexを設定 */
        .content-wrapper {
            position: relative;
            z-index: 2;
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800">

            <!-- パーティクルアニメーションを描画するCanvas -->
            <canvas id="particle-canvas"></canvas>

            <!-- 全てのコンテンツをラッパーで囲む -->
            <div class="content-wrapper w-full h-full flex flex-col items-center justify-center">
                <div class="text-center max-w-4xl mx-auto" data-aos="fade-down" data-aos-duration="1000">
                    <h1 class="text-5xl md:text-7xl font-bold mb-4 tracking-tight">Aitarch</h1>
                    <p class="text-lg md:text-xl text-slate-300 mb-12">AIで日常と投資を豊かにし、次世代の「情報」教育をリードする</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 w-full max-w-6xl mb-16">
                    <a href="ai-life\list.html" class="category-card bg-white/10 backdrop-blur-md p-8 rounded-2xl shadow-lg border border-white/20" data-aos="fade-up" data-aos-id="card">
                        <div class="flex items-center justify-center h-16 w-16 rounded-full bg-blue-500/20 mb-6 mx-auto">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                        </div>
                        <h2 class="text-2xl font-bold text-center mb-3 text-white">AIを活用</h2>
                        <p class="text-center text-slate-300">日々楽しく、生産性を上げよう</p>
                    </a>
                    <a href="ai-invest\list.html" class="category-card bg-white/10 backdrop-blur-md p-8 rounded-2xl shadow-lg border border-white/20" data-aos="fade-up" data-aos-delay="100" data-aos-id="card">
                        <div class="flex items-center justify-center h-16 w-16 rounded-full bg-yellow-500/20 mb-6 mx-auto">

                        </div>

                <div class="w-full max-w-4xl bg-slate-800/50 p-8 rounded-2xl backdrop-blur-sm" data-aos="zoom-in" data-aos-duration="800">

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // AOSを初期化してスクロールアニメーションを有効にする
        AOS.init({
            once: true,
        });

        // --- ここからパーティクルアニメーション用のスクリプト ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');

        let particlesArray;

        // Canvasのサイズをウィンドウサイズに合わせる
        function setCanvasSize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        setCanvasSize();

        // パーティクル（粒子）のクラス定義
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1 - 0.5;
                this.color = 'rgba(255, 255, 255, 0.5)';
            }
            // 位置を更新
            update() {
                if (this.x > canvas.width || this.x < 0) {
                    this.speedX = -this.speedX;
                }
                if (this.y > canvas.height || this.y < 0) {
                    this.speedY = -this.speedY;
                }
                this.x += this.speedX;
                this.y += this.speedY;
            }
            // 粒子を描画
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // パーティクルを初期化する関数
        function initParticles() {
            particlesArray = [];
            let numberOfParticles = (canvas.height * canvas.width) / 9000;
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        // パーティクル同士を線で結ぶ関数
        function connectParticles() {
            let opacityValue = 1;
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x))
                                 + ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                    
                    if (distance < (canvas.width/7) * (canvas.height/7)) {
                        opacityValue = 1 - (distance/20000);
                        ctx.strokeStyle = `rgba(255, 255, 255, ${opacityValue})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        // アニメーションループ
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            connectParticles();
            requestAnimationFrame(animate);
        }

        // ウィンドウのリサイズに対応
        window.addEventListener('resize', () => {
            setCanvasSize();
            initParticles();
        });

        // 実行
        initParticles();
        animate();
    </script>
</body>
