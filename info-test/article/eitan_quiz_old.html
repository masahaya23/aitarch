<!DOCTYPE html>
<html lang="ja">
<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px;
            position: relative;
        }

        .score-display {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #667eea;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .score-display .label {
            font-size: 12px;
            opacity: 0.8;
            display: block;
            margin-bottom: 5px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .start-screen {
            text-align: center;
            padding: 40px 20px;
        }

        .start-screen h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .start-screen p {
            color: #666;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .start-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 50px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            margin-top: 20px;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .start-btn:active {
            transform: translateY(0);
        }

        .quiz-screen {
            display: none;
        }

        .question-number {
            color: #667eea;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .question {
            background: #f8f9ff;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 30px;
            border-left: 5px solid #667eea;
        }

        .question-text {
            color: #333;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .question-label {
            color: #999;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .option {
            background: white;
            border: 2px solid #ddd;
            padding: 15px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
            color: #333;
            text-align: left;
        }

        .option:hover {
            border-color: #667eea;
            background: #f8f9ff;
            transform: translateX(5px);
        }

        .option.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .option.correct {
            background: #4caf50;
            color: white;
            border-color: #4caf50;
        }

        .option.incorrect {
            background: #f44336;
            color: white;
            border-color: #f44336;
        }

        .option.correct-answer {
            background: #4caf50;
            color: white;
            border-color: #4caf50;
            border-width: 2px;
        }

        .option:disabled {
            cursor: not-allowed;
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            width: 100%;
            font-weight: bold;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .feedback {
            margin-top: 20px;
            padding: 20px;
            border-radius: 8px;
            font-size: 16px;
            display: none;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 5px solid #4caf50;
        }

        .feedback.incorrect {
            background: #ffebee;
            color: #c62828;
            border-left: 5px solid #f44336;
        }

        .feedback-title {
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .feedback-content {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 15px; /* 追加 */
        }

        /* 学習コーナーのスタイル */
        .learning-corner {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #ddd;
        }

        .learning-corner-title {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .learning-list {
            list-style: none;
            padding: 0;
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2列表示 */
            gap: 8px;
        }

        .learning-item {
            background: #f0f4ff;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 14px;
            border: 1px solid #e0e8ff;
        }

        .learning-item strong {
            color: #333;
            margin-right: 5px;
        }

        .next-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 15px;
            width: 100%;
            font-weight: bold;
        }

        .next-btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }

        .result-screen {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .result-screen h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .result-score {
            font-size: 48px;
            color: #667eea;
            font-weight: bold;
            margin: 30px 0;
        }

        .result-percentage {
            font-size: 20px;
            color: #666;
            margin-bottom: 30px;
        }

        .result-message {
            font-size: 18px;
            color: #333;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .restart-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 50px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .progress-bar {
            background: #e0e0e0;
            height: 8px;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.3s ease;
        }
    </style>
</head>

    <div class="container">
        <div class="score-display">

            <div class="feedback" id="feedback">

            <button class="next-btn" id="nextBtn" onclick="nextQuestion()" style="display: none;">次の問題へ</button>

            <div class="result-message" id="resultMessage"></div>
            <button class="restart-btn" onclick="restartQuiz()">もう一度挑戦する</button>
        </div>
    </div>

        // 単語データを初期化（最初の1000語）
        wordData = wordDataJson.slice(0, 1000);

        // 日本語訳から英単語を引くためのマップを作成
        const meaningToWordMap = new Map();
        wordData.forEach(item => {
            meaningToWordMap.set(item.meaning, item.word);
        });

        function startQuiz() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('quizScreen').style.display = 'block';
            currentQuestion = 0;
            correctCount = 0;
            loadQuestion();
        }

        function loadQuestion() {
            if (currentQuestion >= wordData.length) {
                showResult();
                return;
            }

            const question = wordData[currentQuestion];
            document.getElementById('questionNumber').textContent = `問題 ${currentQuestion + 1} / 1000`;
            document.getElementById('questionText').textContent = question.word;

            // 選択肢を生成
            const correctAnswer = question.meaning;
            const options = [correctAnswer];

            // ランダムに他の選択肢を追加
            while (options.length < 5) {
                const randomIndex = Math.floor(Math.random() * wordData.length);
                const randomMeaning = wordData[randomIndex].meaning;
                if (!options.includes(randomMeaning)) {
                    options.push(randomMeaning);
                }
            }

            // 選択肢をシャッフル
            for (let i = options.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [options[i], options[j]] = [options[j], options[i]];
            }

            // 現在の選択肢の日本語訳を保存
            currentOptionsMeaning = options;

            // 正解の位置を記録
            const correctIndex = options.indexOf(correctAnswer);

            // 選択肢を表示
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            options.forEach((option, index) => {
                const button = document.createElement('button');
                button.className = 'option';
                button.textContent = option;
                button.onclick = () => selectOption(index, correctIndex);
                optionsContainer.appendChild(button);
            });

            selectedAnswer = null;
            answered = false;
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('feedback').classList.remove('show');
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('learningList').innerHTML = ''; // 学習コーナーをクリア

            // プログレスバーを更新
            const progress = ((currentQuestion + 1) / wordData.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function selectOption(selectedIndex, correctIndex) {
            if (answered) return;

            selectedAnswer = selectedIndex;
            const options = document.querySelectorAll('.option');
            options.forEach((option, index) => {
                option.classList.remove('selected');
                if (index === selectedIndex) {
                    option.classList.add('selected');
                }
            });

            document.getElementById('submitBtn').disabled = false;
        }

        function submitAnswer() {
            if (selectedAnswer === null || answered) return;

            answered = true;
            const options = document.querySelectorAll('.option');
            const correctMeaning = wordData[currentQuestion].meaning;
            const correctIndex = Array.from(options).findIndex(opt => {
                return opt.textContent === correctMeaning;
            });

            const isCorrect = selectedAnswer === correctIndex;

            // 採点結果の表示（現状維持）
            if (isCorrect) {
                correctCount++;
                options[selectedAnswer].classList.remove('selected');
                options[selectedAnswer].classList.add('correct');
                document.getElementById('feedbackTitle').textContent = '✓ 正解！';
                document.getElementById('feedbackContent').textContent = `「${wordData[currentQuestion].word}」は「${wordData[currentQuestion].meaning}」という意味です。`;
                document.getElementById('feedback').classList.remove('incorrect');
                document.getElementById('feedback').classList.add('correct');
            } else {
                options[selectedAnswer].classList.remove('selected');
                options[selectedAnswer].classList.add('incorrect');
                options[correctIndex].classList.add('correct-answer');
                document.getElementById('feedbackTitle').textContent = '✗ 不正解';
                document.getElementById('feedbackContent').textContent = `正解は「${wordData[currentQuestion].meaning}」です。`;
                document.getElementById('feedback').classList.remove('correct');
                document.getElementById('feedback').classList.add('incorrect');
            }

            // 学習コーナーの生成
            const learningList = document.getElementById('learningList');
            learningList.innerHTML = ''; // リストをクリア

            currentOptionsMeaning.forEach(meaning => {
                const word = meaningToWordMap.get(meaning) || '不明'; // マップから英単語を取得
                const listItem = document.createElement('li');
                listItem.className = 'learning-item';
                listItem.innerHTML = `<strong>${word}</strong>: ${meaning}`;
                learningList.appendChild(listItem);
            });

            document.getElementById('feedback').classList.add('show');
            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'block';
            document.getElementById('scoreCount').textContent = correctCount;

            options.forEach(option => option.disabled = true);
        }

        function nextQuestion() {
            currentQuestion++;
            loadQuestion();
            document.getElementById('submitBtn').style.display = 'block';
        }

        function showResult() {
            document.getElementById('quizScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'block';

            const percentage = Math.round((correctCount / wordData.length) * 100);
            document.getElementById('finalScore').textContent = `${correctCount} / 1000`;
            document.getElementById('resultPercentage').textContent = `${percentage}%`;

            let message = '';
            if (percentage === 100) {
                message = '完璧です！素晴らしい成績です！';
            } else if (percentage >= 90) {
                message = 'とても良い成績です！あと少しで完璧です。';
            } else if (percentage >= 80) {
                message = '良い成績です！もう少し頑張りましょう。';
            } else if (percentage >= 70) {
                message = 'まあまあの成績です。もっと単語を覚えましょう。';
            } else if (percentage >= 60) {
                message = '合格ラインです。もっと練習が必要です。';
            } else {
                message = 'もっと頑張る必要があります。単語をしっかり覚えましょう。';
            }

            document.getElementById('resultMessage').textContent = message;
        }

        function restartQuiz() {
            document.getElementById('resultScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'block';
            currentQuestion = 0;
            correctCount = 0;
            selectedAnswer = null;
            answered = false;
            document.getElementById('scoreCount').textContent = '0';
        }
