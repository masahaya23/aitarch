<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- ★ タイトルを変更する ★ -->
    <title>資料タイトル - Aitarch</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="/common/theme.css">
    <style>
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; }
        .launch-btn {
            background: linear-gradient(135deg, #e11d48, #be123c);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .launch-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(225, 29, 72, 0.35);
        }
        .tag {
            background-color: #ffe4e6;
            color: #9f1239;
            font-size: 0.75rem;
            padding: 2px 10px;
            border-radius: 9999px;
        }
        .info-row { border-bottom: 1px solid rgba(0,0,0,0.08); }
    </style>
</head>
<body class="bg-[var(--bg-color)] overflow-x-hidden">

    <div class="flex flex-col md:flex-row min-h-screen">
        <!-- 左サイドバー（JSで自動生成） -->
        <aside id="sidebar-container"
               class="w-full md:w-1/3 lg:w-1/4 p-6 bg-white/60 backdrop-blur-sm border-r border-black/10"
               data-aos="fade-right" data-aos-duration="900">
        </aside>

        <!-- メインコンテンツ -->
        <main class="w-full md:w-2/3 lg:w-3/4 p-8 md:p-12"
              data-aos="fade-left" data-aos-duration="900" data-aos-delay="200">
            <div class="max-w-3xl text-[var(--text-color)]">

                <!-- ★ タグ���変更する ★ -->
                <div class="flex items-center gap-3 mb-2">
                    <span class="tag">📄 PDF</span>
                    <span class="tag">★教科・分野タグ★</span>
                </div>

                <!-- ★ タイトルを変��する ★ -->
                <h1 class="text-3xl md:text-4xl font-bold pb-4 mt-4 mb-6 border-b border-[var(--theme-color)]/30">
                    資料タイトル
                </h1>

                <!-- PDFを開くボタン -->
                <div class="mb-10" data-aos="zoom-in" data-aos-duration="600">
                    <!-- ★ href の PDFパスを変更する ★ -->
                    <a href="/★カテゴリ★/pdf/★ファイル名★.pdf" target="_blank" rel="noopener"
                       class="launch-btn inline-flex items-center gap-3 text-white font-bold text-lg px-8 py-4 rounded-2xl shadow-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                        </svg>
                        PDFを開く（別窓）
                    </a>
                    <p class="mt-2 text-sm opacity-60">PDFは新しいタブで開きます</p>
                </div>

                <!-- 資料概要 -->
                <section class="prose prose-lg max-w-none mb-8" data-aos="fade-up">
                    <h2 class="text-xl font-bold mb-3" style="color:var(--text-color)">資料概要</h2>
                    <!-- ★ 概要を記述する ★ -->
                    <p style="color:var(--text-color)">この資料について説明してください。</p>
                </section>

                <!-- 情報テーブル -->
                <section class="mb-8 bg-white/70 rounded-xl overflow-hidden border border-[var(--theme-color)]/20" data-aos="fade-up" data-aos-delay="100">
                    <!-- ★ 各行の右側テキストを変更する ★ -->
                    <div class="info-row flex px-5 py-3 text-sm">
                        <span class="w-32 font-bold opacity-70">対象</span>
                        <span>★対象★</span>
                    </div>
                    <div class="info-row flex px-5 py-3 text-sm">
                        <span class="w-32 font-bold opacity-70">ページ数</span>
                        <span>★ページ数★</span>
                    </div>
                    <div class="flex px-5 py-3 text-sm">
                        <span class="w-32 font-bold opacity-70">公開日</span>
                        <span>★公開日★</span>
                    </div>
                </section>

                <!-- 目次（任意） -->
                <section class="mb-8" data-aos="fade-up" data-aos-delay="150">
                    <h2 class="text-xl font-bold mb-3" style="color:var(--text-color)">目次</h2>
                    <!-- ★ 目次を記述する（不要なら section ごと削除） ★ -->
                    <ol class="text-sm opacity-80 list-decimal list-inside space-y-1">
                        <li>章タイトル1</li>
                        <li>章タイトル2</li>
                    </ol>
                </section>

            </div>
            <footer class="text-left text-slate-400 mt-12">
                <p>&copy; 2025 Aitarch. All Rights Reserved.</p>
            </footer>
        </main>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true });

        const script = document.createElement('script');
        script.src = `../../sidebar.js?v=${new Date().getTime()}`;
        script.onload = function() {
            // ★ カテゴリID と このファイルのURL を変更する ★
            generateSidebar('ai-life', '/ai-life/article/N.html');
        };
        document.body.appendChild(script);
    </script>
</body>
</html>
