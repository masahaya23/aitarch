<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- ★ タイトルを変更する ★ -->
    <title>記事タイトル - Aitarch</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="/common/theme.css">
    <style>
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; }
    </style>
</head>
<body class="bg-[var(--bg-color)] overflow-x-hidden">

    <div class="flex flex-col md:flex-row min-h-screen">
        <!-- 左サイドバー（JSで自動生成） -->
        <aside id="sidebar-container"
               class="w-full md:w-1/3 lg:w-1/4 p-6 bg-white/60 backdrop-blur-sm border-r border-black/10"
               data-aos="fade-right" data-aos-duration="900">
        </aside>

        <!-- 記事本文 -->
        <main class="w-full md:w-2/3 lg:w-3/4 p-8 md:p-12"
              data-aos="fade-up" data-aos-duration="900" data-aos-delay="200">
            <div class="prose prose-lg max-w-4xl
                        text-[var(--text-color)]
                        prose-headings:text-[var(--text-color)]
                        prose-p:text-[var(--text-color)]
                        prose-strong:text-[var(--text-color)]
                        prose-a:text-[var(--theme-color)]
                        prose-ul:text-[var(--text-color)]
                        prose-li:text-[var(--text-color)]">

                <!-- ★ 記事タイトルを変更する ★ -->
                <h1 class="text-4xl font-bold pb-4 mb-4 border-b border-[var(--theme-color)]/30">記事タイトル</h1>
                <!-- ★ 公開日を変更する ★ -->
                <p class="text-base opacity-70 mb-8">公開日: 2025-00-00</p>

                <!-- ★★★ 記事本文をここに書く ★★★ -->
                <p>本文をここに記述してください。</p>

                <h2>見出し2</h2>
                <p>内容...</p>

                <ul>
                    <li>箇条書き1</li>
                    <li>箇条書き2</li>
                </ul>
                <!-- ★★★ 記事本文ここまで ★★★ -->

            </div>
            <footer class="text-left text-slate-400 mt-12">
                <p>&copy; 2025 Aitarch. All Rights Reserved.</p>
            </footer>
        </main>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true });

        const script = document.createElement('script');
        script.src = `../../sidebar.js?v=${new Date().getTime()}`;
        script.onload = function() {
            // ★ カテゴリID と このファイルのURL を変更する ★
            // カテゴリID: 'ai-life' / 'ai-invest' / 'info-test' / 'ai-agent'
            // URL例: '/ai-life/article/7.html'
            generateSidebar('ai-life', '/ai-life/article/N.html');
        };
        document.body.appendChild(script);
    </script>
</body>
</html>
